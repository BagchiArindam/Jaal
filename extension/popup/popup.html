<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      font: 13px -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      padding: 12px;
      width: 280px;
      margin: 0;
      background: #f9fafb;
    }
    .button {
      display: block;
      width: 100%;
      padding: 10px;
      margin-bottom: 8px;
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      transition: background-color 0.2s;
    }
    .button:hover {
      background: #1d4ed8;
    }
    .button:active {
      background: #1e40af;
    }
    .divider {
      border-top: 1px solid #e5e7eb;
      margin: 12px 0;
    }
    .status {
      font: 11px monospace;
      color: #6b7280;
      margin-top: 10px;
      padding: 8px;
      background: #fff;
      border-radius: 4px;
      border: 1px solid #e5e7eb;
    }
    .status.online {
      color: #059669;
      background: #ecfdf5;
      border-color: #d1fae5;
    }
    .status.offline {
      color: #dc2626;
      background: #fef2f2;
      border-color: #fee2e2;
    }
    .status-icon {
      display: inline-block;
      margin-right: 4px;
    }
  </style>
</head>
<body>
  <button class="button" id="skeleton-btn">🔍 Inspect skeleton</button>
  <button class="button" id="net-recorder-btn">📡 Net recorder</button>
  <div class="divider"></div>
  <div class="status" id="status">
    <span class="status-icon">⏳</span>
    <span>Server: checking…</span>
  </div>
  <script src="popup.js"></script>
</body>
</html>
